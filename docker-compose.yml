services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_NAME: gobanking-v2
      APP_ENV: docker
      APP_PORT: 8080

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gobanking_v2
      DB_USER: gobanking
      DB_PASSWORD: changeme
      DB_SSLMODE: disable

      LOG_LEVEL: info
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gobanking_v2
      POSTGRES_USER: gobanking
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

